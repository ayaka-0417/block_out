<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ブロック崩し</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

  :root {
    --bg: #0a0a1a;
    --surface: #12122a;
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --paddle: #00f5ff;
    --ball: #ffe600;
    --text: #e0e0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Orbitron', monospace;
    color: var(--text);
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #hud {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px 8px;
    gap: 8px;
  }

  .hud-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 22px;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: 0 0 12px var(--neon-cyan);
  }

  #lives-display {
    font-size: 18px;
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink);
    letter-spacing: 4px;
  }

  #canvas-wrapper {
    position: relative;
    z-index: 5;
    border: 1px solid rgba(0, 245, 255, 0.3);
    box-shadow:
      0 0 20px rgba(0, 245, 255, 0.15),
      inset 0 0 40px rgba(0, 0, 30, 0.8);
    border-radius: 4px;
    overflow: hidden;
  }

  canvas {
    display: block;
    background: var(--surface);
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(8, 8, 24, 0.88);
    gap: 16px;
    z-index: 20;
    backdrop-filter: blur(4px);
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,245,255,0.4);
    letter-spacing: 4px;
    text-align: center;
  }

  .overlay-sub {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 1.7;
  }

  #start-btn {
    margin-top: 8px;
    padding: 16px 40px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 16px rgba(0,245,255,0.3), inset 0 0 16px rgba(0,245,255,0.05);
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  #start-btn:active {
    background: rgba(0, 245, 255, 0.15);
    box-shadow: 0 0 30px rgba(0,245,255,0.5), inset 0 0 20px rgba(0,245,255,0.1);
    transform: scale(0.97);
  }

  #result-label {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    letter-spacing: 4px;
  }

  #touch-hint {
    position: relative;
    z-index: 5;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    padding: 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-box">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="score-display">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">LIVES</div>
    <div id="lives-display">♥ ♥ ♥</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">LEVEL</div>
    <div class="hud-value" id="level-display">1</div>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <div class="overlay-title">BLOCK<br>BREAKER</div>
    <div class="overlay-sub">画面をタッチ・スライドして<br>パドルを動かそう</div>
    <button id="start-btn" onclick="startGame()">START</button>
  </div>
</div>

<div id="touch-hint">👆 スライドでパドル操作</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score-display');
const livesEl = document.getElementById('lives-display');
const levelEl = document.getElementById('level-display');
const resultLabel = document.getElementById('result-label');

// Responsive sizing
function resize() {
  const maxW = Math.min(window.innerWidth - 8, 520);
  const maxH = Math.min(window.innerHeight - 150, 680);
  canvas.width = maxW;
  canvas.height = maxH;
}
resize();
window.addEventListener('resize', () => { resize(); if (!gameRunning) drawIdle(); });

// Game state
let score = 0, lives = 3, level = 1;
let gameRunning = false, animId = null;

// Paddle
let paddle = { w: 90, h: 12, x: 0, y: 0, speed: 0 };

// Ball
let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 7 };

// Blocks
const COLS = 8, ROWS = 5;
const BLOCK_COLORS = [
  ['#ff006e', '#ff4d9e'],
  ['#ff6b00', '#ff9a4d'],
  ['#ffe600', '#fff176'],
  ['#39ff14', '#7dff5f'],
  ['#00f5ff', '#80faff'],
];
let blocks = [];
let particles = [];

function initLevel() {
  const bw = (canvas.width - 20) / COLS;
  const bh = 22;
  blocks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const hp = (ROWS - r);
      blocks.push({
        x: 10 + c * bw,
        y: 50 + r * (bh + 5),
        w: bw - 4,
        h: bh,
        hp: hp,
        maxHp: hp,
        color: BLOCK_COLORS[r % BLOCK_COLORS.length],
      });
    }
  }
}

function resetBall() {
  paddle.w = Math.max(60, 90 - (level - 1) * 5);
  paddle.x = canvas.width / 2 - paddle.w / 2;
  paddle.y = canvas.height - 40;
  ball.x = canvas.width / 2;
  ball.y = paddle.y - ball.r - 2;
  const speed = 4 + level * 0.5;
  const angle = (-Math.PI / 2) + (Math.random() - 0.5) * 0.8;
  ball.vx = Math.cos(angle) * speed;
  ball.vy = Math.sin(angle) * speed;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color,
      r: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.04;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawBlock(b) {
  const ratio = b.hp / b.maxHp;
  // Shadow glow
  ctx.shadowColor = b.color[0];
  ctx.shadowBlur = 8;
  // Fill
  const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  grad.addColorStop(0, b.color[1]);
  grad.addColorStop(1, b.color[0]);
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.5 + ratio * 0.5;
  roundRect(ctx, b.x, b.y, b.w, b.h, 3);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  // Border
  ctx.strokeStyle = b.color[1];
  ctx.lineWidth = 1;
  roundRect(ctx, b.x, b.y, b.w, b.h, 3);
  ctx.stroke();
  // HP pips
  if (b.maxHp > 1) {
    for (let i = 0; i < b.hp; i++) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(b.x + 6 + i * 7, b.y + b.h / 2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawPaddle() {
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 16;
  const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y + paddle.h);
  grad.addColorStop(0, '#80faff');
  grad.addColorStop(0.5, '#00f5ff');
  grad.addColorStop(1, '#0088aa');
  ctx.fillStyle = grad;
  roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBall() {
  ctx.shadowColor = '#ffe600';
  ctx.shadowBlur = 20;
  const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#fff9c4');
  grad.addColorStop(1, '#ffe600');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 1;
  const gs = 30;
  for (let x = 0; x < canvas.width; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

function update() {
  // Move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r > canvas.width) { ball.x = canvas.width - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  // Paddle collision
  if (
    ball.vy > 0 &&
    ball.y + ball.r >= paddle.y &&
    ball.y + ball.r <= paddle.y + paddle.h + 4 &&
    ball.x >= paddle.x - ball.r &&
    ball.x <= paddle.x + paddle.w + ball.r
  ) {
    const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    const angle = hit * (Math.PI / 3);
    const speed = Math.hypot(ball.vx, ball.vy);
    ball.vx = Math.sin(angle) * speed;
    ball.vy = -Math.cos(angle) * speed;
    ball.y = paddle.y - ball.r;
  }

  // Bottom = lose life
  if (ball.y - ball.r > canvas.height) {
    lives--;
    updateHUD();
    if (lives <= 0) { endGame(false); return; }
    resetBall();
  }

  // Block collision
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (
      ball.x + ball.r > b.x &&
      ball.x - ball.r < b.x + b.w &&
      ball.y + ball.r > b.y &&
      ball.y - ball.r < b.y + b.h
    ) {
      b.hp--;
      const pts = b.maxHp * 10 * level;
      score += pts;
      spawnParticles(ball.x, ball.y, b.color[0]);

      const overlapL = (ball.x + ball.r) - b.x;
      const overlapR = (b.x + b.w) - (ball.x - ball.r);
      const overlapT = (ball.y + ball.r) - b.y;
      const overlapB = (b.y + b.h) - (ball.y - ball.r);
      const minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB);
      if (minOverlap === overlapT || minOverlap === overlapB) ball.vy *= -1;
      else ball.vx *= -1;

      if (b.hp <= 0) blocks.splice(i, 1);
      updateHUD();
      break;
    }
  }

  // Level clear
  if (blocks.length === 0) {
    level++;
    updateHUD();
    initLevel();
    resetBall();
  }

  updateParticles();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  blocks.forEach(drawBlock);
  drawPaddle();
  drawBall();
  drawParticles();
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  const hearts = '♥ '.repeat(Math.max(0, lives)).trim();
  livesEl.textContent = hearts || '✕';
}

function startGame() {
  score = 0; lives = 3; level = 1;
  updateHUD();
  initLevel();
  resetBall();
  overlay.classList.add('hidden');
  gameRunning = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function endGame(won) {
  gameRunning = false;
  if (animId) cancelAnimationFrame(animId);

  overlay.innerHTML = `
    <div class="overlay-title" style="color:${won ? 'var(--neon-green)' : 'var(--neon-pink)'}; text-shadow:0 0 20px ${won ? 'var(--neon-green)' : 'var(--neon-pink)'}">
      ${won ? 'CLEAR!' : 'GAME<br>OVER'}
    </div>
    <div class="overlay-sub">スコア: <strong style="color:var(--neon-yellow)">${score}</strong></div>
    <button id="start-btn" onclick="startGame()">もう一度</button>
  `;
  overlay.classList.remove('hidden');
}

function drawIdle() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
}
drawIdle();

// Touch / Mouse input
let touchX = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gameRunning || touchX === null) return;
  const dx = e.touches[0].clientX - touchX;
  touchX = e.touches[0].clientX;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x + dx * 1.4));
}, { passive: false });

canvas.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, e.clientX - rect.left - paddle.w / 2));
});
</script>
</body>
</html>
